<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>خريطة عماير مكة</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<style>
:root{
  --bg:#f4f6f8; --card:#fff; --text:#1f2937; --muted:#6b7280; --line:#e5e7eb;
  --pk-bg:#dcfce7; --pk-border:#86efac; --pk-text:#166534;
  --ng-bg:#dbeafe; --ng-border:#93c5fd; --ng-text:#1d4ed8;
  --eg-bg:#fee2e2; --eg-border:#fca5a5; --eg-text:#b91c1c;
}
*{box-sizing:border-box}
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text)}
.app{display:grid;grid-template-columns:360px 1fr;gap:14px;height:100vh;padding:14px}
.sidebar,.mapwrap{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;min-height:0}
.sidebar{display:flex;flex-direction:column}
.head{padding:18px 18px 10px;border-bottom:1px solid var(--line)}
h1{margin:0 0 8px;font-size:24px}
.sub{color:var(--muted);font-size:13px;line-height:1.7}
.controls{padding:12px 16px;border-bottom:1px solid var(--line);display:grid;gap:10px}
input{width:100%;border:1px solid #d1d5db;border-radius:12px;padding:12px;font-size:14px;background:#fff}
.stats,.toggle-row,.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.badge{border-radius:999px;padding:6px 10px;font-size:12px;border:1px solid var(--line);background:#fff}
.badge.pk{background:var(--pk-bg);border-color:var(--pk-border);color:var(--pk-text)}
.badge.ng{background:var(--ng-bg);border-color:var(--ng-border);color:var(--ng-text)}
.badge.eg{background:var(--eg-bg);border-color:var(--eg-border);color:var(--eg-text)}
.toggle,.filter-btn{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:999px;padding:8px 12px;font-size:13px;cursor:pointer}
.toggle.active{background:#0f766e;color:#fff;border-color:#0f766e}
.filter-btn.active{color:#111827;box-shadow:0 4px 14px rgba(0,0,0,.06)}
.filter-btn.all.active{background:#eef2ff;border-color:#c7d2fe}
.filter-btn.pk.active{background:var(--pk-bg);border-color:var(--pk-border);color:var(--pk-text)}
.filter-btn.ng.active{background:var(--ng-bg);border-color:var(--ng-border);color:var(--ng-text)}
.filter-btn.eg.active{background:var(--eg-bg);border-color:var(--eg-border);color:var(--eg-text)}
.list{overflow:auto;padding:8px}
.item{border:1px solid var(--line);border-radius:16px;padding:12px;margin:8px;cursor:pointer;background:#fff}
.item:hover,.item.active{box-shadow:0 8px 18px rgba(15,118,110,.12);background:#f8fffe}
.item.pk{background:var(--pk-bg);border-color:var(--pk-border)}
.item.ng{background:var(--ng-bg);border-color:var(--ng-border)}
.item.eg{background:var(--eg-bg);border-color:var(--eg-border)}
.title{font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{display:inline-block;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:700;background:rgba(255,255,255,.85);border:1px solid rgba(0,0,0,.08)}
.meta{color:#334155;font-size:12px;line-height:1.9}
.actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn{display:inline-block;text-decoration:none;border-radius:10px;padding:8px 10px;font-size:13px;border:1px solid rgba(0,0,0,.08);color:var(--text);background:rgba(255,255,255,.92);cursor:pointer}
.btn.primary{background:#0f766e;color:#fff;border-color:#0f766e}
.mapbar{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.mapnote{color:var(--muted);font-size:13px}
#map{height:calc(100vh - 84px);width:100%}
.leaflet-popup-content{font-family:Tahoma,Arial,sans-serif;line-height:1.8}
.popup-title{font-weight:700;margin-bottom:6px}
.popup-meta{color:#4b5563;font-size:12px}
.label-marker{background:transparent;border:none}
.label-wrap{display:flex;align-items:center;gap:6px;transform:translate(-50%,-50%);pointer-events:auto}
.label-dot{width:14px;height:14px;border:2px solid #fff;border-radius:999px;box-shadow:0 2px 8px rgba(0,0,0,.22);flex:0 0 auto}
.label-text{background:rgba(255,255,255,.97);border-radius:999px;padding:4px 8px;font-size:12px;font-weight:700;line-height:1.2;white-space:nowrap;box-shadow:0 4px 10px rgba(0,0,0,.08)}
.mobile-cards{display:none;padding:12px;gap:10px;background:var(--bg)}
.mobile-cards .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.mobile-cards .item{margin:0;padding:10px 8px;border-radius:14px;min-height:104px}
.mobile-cards .title{margin:0 0 6px;justify-content:space-between;align-items:flex-start;gap:6px}
.mobile-cards .title span:first-child{font-size:12px;line-height:1.5}
.mobile-cards .meta,.mobile-cards .actions{display:none}
.mobile-mini-actions{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.mobile-mini-actions .btn{padding:6px 8px;font-size:11px}
.distance-badge{display:inline-block;margin-top:4px;border-radius:999px;padding:3px 7px;font-size:10px;font-weight:700;background:rgba(255,255,255,.85);border:1px solid rgba(0,0,0,.08)}
@media (max-width:900px){
  .app{display:flex;flex-direction:column;height:auto;padding:10px}
  .sidebar{display:none}
  .mapwrap{order:1}
  #map{height:62vh}
  .mobile-cards{display:grid;order:2}
  .label-text{font-size:11px;padding:3px 7px}
  .mobile-cards .grid{grid-template-columns:repeat(3,minmax(0,1fr))}
}
@media (max-width:420px){
  .mobile-cards .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="head">
      <h1>خريطة عماير مكة</h1>
      <div class="sub">هذه النسخة النهائية: الاسم أو رقم التصريح فوق الخريطة، فلتر جنسيات، نسخ المعلومات والموقع، وكروت للجوال.</div>
    </div>
    <div class="controls">
      <input id="search" placeholder="ابحث بالاسم أو رقم التصريح أو رقم التواصل">
      <div class="filter-row">
        <button class="filter-btn all active" data-filter="الكل">الكل</button>
        <button class="filter-btn eg" data-filter="مصر">مصر</button>
        <button class="filter-btn ng" data-filter="النيجر">النيجر</button>
        <button class="filter-btn pk" data-filter="باكستان">باكستان</button>
      </div>
      <div class="toggle-row">
        <button class="toggle active" id="showName">إظهار الاسم</button>
        <button class="toggle" id="showPermit">إظهار رقم التصريح</button>
        <button class="toggle" id="fitBtn">ملاءمة الظاهر</button>
      </div>
      <div class="stats">
        <span class="badge">الظاهر الآن: <b id="visibleCount">0</b></span>
        <span class="badge">على الخريطة: <b>208</b></span>
        <span class="badge pk">باكستان</span>
        <span class="badge ng">النيجر</span>
        <span class="badge eg">مصر</span>
      </div>
    </div>
    <div class="list" id="list"></div>
  </aside>

  <main class="mapwrap">
    <div class="mapbar">
      <div class="mapnote">خريطة ملونة وواضحة. إذا سمحت بالموقع سيظهر مكانك مباشرة على الخريطة.</div>
      <div class="toggle-row">
        <button class="filter-btn all active" data-filter="الكل" data-mobile-filter="1">الكل</button>
        <button class="filter-btn eg" data-filter="مصر" data-mobile-filter="1">مصر</button>
        <button class="filter-btn ng" data-filter="النيجر" data-mobile-filter="1">النيجر</button>
        <button class="filter-btn pk" data-filter="باكستان" data-mobile-filter="1">باكستان</button>
        <button class="toggle active" id="mobileShowName">الاسم</button>
        <button class="toggle" id="mobileShowPermit">رقم التصريح</button>
        <button class="toggle" id="locateBtn">موقعي</button>
      </div>
    </div>
    <div id="map"></div>
  </main>

  <section class="mobile-cards">
    <input id="searchMobile" placeholder="ابحث بالاسم أو رقم التصريح أو رقم التواصل">
    <div class="stats">
      <span class="badge">الظاهر الآن: <b id="visibleCountMobile">0</b></span>
      <span class="badge">على الخريطة: <b>208</b></span>
      <span class="badge pk">باكستان</span>
      <span class="badge ng">النيجر</span>
      <span class="badge eg">مصر</span>
    </div>
    <div id="mobileList" class="grid"></div>
  </section>
</div>

function distanceMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(a));
}
function formatDistance(m) {
  if (m == null || Number.isNaN(m)) return '';
  if (m < 1000) return `${Math.round(m)} م`;
  return `${(m / 1000).toFixed(1)} كم`;
}
function userDistance(item) {
  if (!userLatLng || !item.has_coords) return '';
  return formatDistance(distanceMeters(userLatLng.lat, userLatLng.lng, item.lat, item.lng));
}
function updateUserLocation(lat, lng, centerMap=false) {

    userMarker.setLatLng([lat, lng]);

    map.setView([lat, lng], 15);

  }
  renderCards(filteredLocations(searchEl.value || searchMobileEl.value));
}
function startLiveLocation() {

}

async function copyText(text, btn, successText='تم النسخ') {
  try {
    await navigator.clipboard.writeText(text);
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }
  if (btn) {
    const old = btn.textContent;
    btn.textContent = successText;
    setTimeout(() => btn.textContent = old, 1200);
  }
}
function popupHtml(item) {
  return `
    <div class="popup-title">${esc(item.name)}</div>
    <div class="popup-meta">
      الجنسية: ${esc(item.nationality)}<br>
      رقم التصريح: ${esc(item.permit)}<br>
      رقم التواصل: ${esc(item.phone || '—')}${item.extra ? `<br>بيانات إضافية: ${esc(item.extra)}` : ''}${userDistance(item) ? `<br>المسافة منك: ${esc(userDistance(item))}` : ''}
    </div>
    <div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;">
      <a href="${item.link}" target="_blank">فتح الموقع</a>
      ${item.has_coords ? `<a href="${navUrl(item.lat, item.lng)}" target="_blank">الملاحة</a>` : ``}
    </div>
  `;
}
function desktopCardHtml(item) {
  return `
    <div class="title">
      <span>${esc(item.name)}</span>
      <span class="pill">تصريح ${esc(item.permit || '—')}</span>
    </div>
    <div class="meta">
      رقم التواصل: ${esc(item.phone || '—')}${item.extra ? `<br>بيانات إضافية: ${esc(item.extra)}` : ''}${userDistance(item) ? `<br>المسافة منك: ${esc(userDistance(item))}` : ''}${!item.has_coords ? `<br>الموقع: رابط مباشر فقط` : ''}
    </div>
    <div class="actions">
      <button class="btn" data-copy="info">نسخ المعلومات</button>
      <button class="btn" data-copy="location">نسخ الموقع</button>
      ${item.has_coords ? `<a class="btn primary" href="${navUrl(item.lat, item.lng)}" target="_blank">الملاحة</a>` : ``}
      <a class="btn" href="${item.link}" target="_blank">فتح في Google Maps</a>
    </div>
  `;
}
function mobileCardHtml(item) {
  return `
    <div class="title">
      <span>${esc(item.name)}</span>
      <span class="pill">تصريح ${esc(item.permit || '—')}</span>
    </div>
    <div class="distance-badge">${esc(userDistance(item) ? `يبعد ${userDistance(item)}` : (item.phone ? item.phone : 'رابط مباشر'))}</div>
    <div class="mobile-mini-actions">
      <button class="btn" data-copy="info">نسخ المعلومات</button>
      <button class="btn" data-copy="location">نسخ الموقع</button>
    </div>
  `;
}
function bindCopyActions(div, item) {
  const infoBtn = div.querySelector('[data-copy="info"]');
  const locBtn = div.querySelector('[data-copy="location"]');
  if (infoBtn) infoBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    copyText(cardInfoText(item), e.currentTarget);
  });
  if (locBtn) locBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    copyText(item.has_coords ? `${item.lat},${item.lng}` : item.link, e.currentTarget);
  });
}
function openItem(item) {
  if (item.has_coords) {
    const marker = markers.find(m => m.item._index === item._index);
    if (marker) {
      map.setView([item.lat, item.lng], 17);
      marker.openPopup();
      highlightCard(item._index);
      document.getElementById('map').scrollIntoView({behavior:'smooth', block:'start'});
      return;
    }
  }
  if (item.link) window.open(item.link, '_blank');
}
function renderCards(items) {
  listEl.innerHTML = '';
  items.forEach((item) => {
    const div = document.createElement('div');
    div.className = `item ${nationalityClass(item)}`;
    div.dataset.index = item._index;
    div.innerHTML = desktopCardHtml(item);
    bindCopyActions(div, item);
    div.addEventListener('click', (e) => {
      if (e.target.closest('a,button')) return;
      openItem(item);
    });
    listEl.appendChild(div);
  });
  mobileListEl.innerHTML = '';
  items.forEach((item) => {
    const div = document.createElement('div');
    div.className = `item ${nationalityClass(item)}`;
    div.dataset.index = item._index;
    div.innerHTML = mobileCardHtml(item);
    bindCopyActions(div, item);
    div.addEventListener('click', (e) => {
      if (e.target.closest('button')) return;
      openItem(item);
    });
    mobileListEl.appendChild(div);
  });
  visibleCountEl.textContent = items.length;
  visibleCountMobileEl.textContent = items.length;
}
function highlightCard(index) {
  document.querySelectorAll('.item').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.index) === index);
  });
}
locations.forEach((item, index) => {
  item._index = index;
  if (item.has_coords) {
    const marker = L.marker([item.lat, item.lng], { icon: markerIcon(item) }).addTo(group);
    marker.item = item;
    marker.bindPopup(popupHtml(item));
    marker.on('click', () => highlightCard(index));
    markers.push(marker);
  }
});
function filteredLocations(query='') {
  const q = query.trim().toLowerCase();
  return locations.filter(item => {
    const nationalityOk = nationalityFilter === 'الكل' || item.nationality === nationalityFilter;
    const s = `${item.name} ${item.permit} ${item.phone} ${item.extra} ${item.nationality}`.toLowerCase();
    return nationalityOk && (!q || s.includes(q));
  });
}
function fitAll(items) {
  const withCoords = items.filter(i => i.has_coords);
  if (!withCoords.length) return;
  const bounds = L.latLngBounds(withCoords.map(i => [i.lat, i.lng]));
  map.fitBounds(bounds.pad(0.15));
}
function refreshMarkerLabels() {
  markers.forEach(marker => marker.setIcon(markerIcon(marker.item)));
}
function syncFilterButtons() {
  filterButtons.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === nationalityFilter);
  });
}
function applyFilter(query='') {
  const filtered = filteredLocations(query);
  markers.forEach(marker => {
    const show = filtered.some(i => i._index === marker.item._index);
    if (show) {
      if (!group.hasLayer(marker)) group.addLayer(marker);
    } else {
      if (group.hasLayer(marker)) group.removeLayer(marker);
    }
  });
  renderCards(filtered);
  fitAll(filtered);
}
function setMode(mode) {
  labelMode = mode;
  showNameBtn.classList.toggle('active', mode === 'name');
  showPermitBtn.classList.toggle('active', mode === 'permit');
  mobileShowNameBtn.classList.toggle('active', mode === 'name');
  mobileShowPermitBtn.classList.toggle('active', mode === 'permit');
  refreshMarkerLabels();
}

filterButtons.forEach(btn => btn.addEventListener('click', () => {
  nationalityFilter = btn.dataset.filter;
  syncFilterButtons();
  applyFilter(searchEl.value || searchMobileEl.value);
}));
searchEl.addEventListener('input', () => {
  searchMobileEl.value = searchEl.value;
  applyFilter(searchEl.value);
});
searchMobileEl.addEventListener('input', () => {
  searchEl.value = searchMobileEl.value;
  applyFilter(searchMobileEl.value);
});
fitBtn.addEventListener('click', () => fitAll(filteredLocations(searchEl.value || searchMobileEl.value)));
showNameBtn.addEventListener('click', () => setMode('name'));
showPermitBtn.addEventListener('click', () => setMode('permit'));
mobileShowNameBtn.addEventListener('click', () => setMode('name'));
mobileShowPermitBtn.addEventListener('click', () => setMode('permit'));
locateBtn.addEventListener('click', () => startLiveLocation());

window.addEventListener('load', () => {
  startLiveLocation();
});

syncFilterButtons();
renderCards(locations);
setMode('name');
fitAll(locations);
</script>
</body>
</html>
