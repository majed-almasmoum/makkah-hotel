<!doctype html>

<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>خريطة عماير مكة — الراجحي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
/* ══════════════════════════════
   VARIABLES — الصفحة فاتحة دائماً
   الخريطة داكنة دائماً
══════════════════════════════ */
:root {
  --bg: #f4f6f9;
  --card: #ffffff;
  --border: #e2e8f0;
  --border-hi: #cbd5e1;
  --text: #1e293b;
  --text2: #475569;
  --muted: #94a3b8;
  --radius: 16px;
  --radius-sm: 10px;
  --rpill: 999px;
  --font: 'Cairo', Tahoma, Arial, sans-serif;
  --shadow: 0 4px 24px rgba(0,0,0,.08);
  --shadow-md: 0 8px 32px rgba(0,0,0,.12);

–accent: #0f766e;
–accent-dim: rgba(15,118,110,.1);
–accent-glow: rgba(15,118,110,.2);

–eg: #dc2626;
–eg-bg: rgba(220,38,38,.08);
–eg-border: rgba(220,38,38,.3);
–eg-glow: rgba(220,38,38,.2);

–ng: #2563eb;
–ng-bg: rgba(37,99,235,.08);
–ng-border: rgba(37,99,235,.3);
–ng-glow: rgba(37,99,235,.2);

–pk: #16a34a;
–pk-bg: rgba(22,163,74,.08);
–pk-border: rgba(22,163,74,.3);
–pk-glow: rgba(22,163,74,.2);
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
font-family: var(–font);
background: var(–bg);
color: var(–text);
min-height: 100vh;
overflow: hidden;
}

/* ══ LAYOUT ══ */
.app { display: grid; grid-template-columns: 380px 1fr; height: 100vh; }

/* ══ SIDEBAR ══ */
.sidebar {
display: flex;
flex-direction: column;
background: var(–card);
border-left: 1px solid var(–border);
overflow: hidden;
box-shadow: 2px 0 20px rgba(0,0,0,.06);
z-index: 10;
}

/* HEAD */
.head {
padding: 22px 20px 18px;
border-bottom: 1px solid var(–border);
background: linear-gradient(135deg, #f0fdf9 0%, #fff 60%);
position: relative;
}
.head::after {
content: ‘’;
position: absolute;
bottom: 0; left: 0; right: 0;
height: 2px;
background: linear-gradient(90deg, transparent, var(–accent-glow), transparent);
}

.brand { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.brand-icon {
width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0;
background: linear-gradient(135deg, #0f766e, #0d9488);
display: flex; align-items: center; justify-content: center; font-size: 22px;
box-shadow: 0 6px 18px rgba(15,118,110,.3), inset 0 1px 0 rgba(255,255,255,.2);
}
.brand-text h1 { font-size: 18px; font-weight: 900; letter-spacing: -.3px; line-height: 1.2; color: var(–text); }
.brand-text p { font-size: 11px; color: var(–muted); margin-top: 3px; font-weight: 600; }

.stats-row { display: flex; gap: 6px; flex-wrap: wrap; }
.stat-pill {
background: #f8fafc; border: 1px solid var(–border); border-radius: var(–rpill);
padding: 5px 11px; font-size: 11px; color: var(–text2);
display: flex; align-items: center; gap: 6px; font-weight: 600;
}
.stat-pill b { color: var(–accent); font-weight: 800; font-size: 12px; }
.stat-pill.eg-s { border-color: var(–eg-border); background: var(–eg-bg); color: var(–eg); }
.stat-pill.ng-s { border-color: var(–ng-border); background: var(–ng-bg); color: var(–ng); }
.stat-pill.pk-s { border-color: var(–pk-border); background: var(–pk-bg); color: var(–pk); }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.eg { background: var(–eg); }
.dot.ng { background: var(–ng); }
.dot.pk { background: var(–pk); }

/* ══ CONTROLS ══ */
.controls { padding: 14px 16px; border-bottom: 1px solid var(–border); display: flex; flex-direction: column; gap: 12px; }

.srch { position: relative; }
.srch-icon { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); color: var(–muted); font-size: 16px; pointer-events: none; transition: color .2s; }
.srch:focus-within .srch-icon { color: var(–accent); }

input {
width: 100%; background: #f8fafc; border: 1px solid var(–border);
border-radius: var(–radius); padding: 11px 40px 11px 14px;
font-size: 13px; font-family: var(–font); color: var(–text);
outline: none; font-weight: 500; transition: all .25s;
}
input:focus { border-color: var(–accent); box-shadow: 0 0 0 3px var(–accent-glow); background: #fff; }
input::placeholder { color: var(–muted); font-weight: 400; }

.flabel {
font-size: 10px; letter-spacing: 1.5px; color: var(–muted);
font-weight: 800; text-transform: uppercase;
display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
}
.flabel::before { content: ‘’; width: 3px; height: 12px; background: var(–accent); border-radius: 2px; }

/* فلتر الجنسية */
.chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
background: #f8fafc; border: 1px solid var(–border); border-radius: var(–rpill);
padding: 7px 14px; font-size: 12px; font-family: var(–font); color: var(–text2);
cursor: pointer; transition: all .2s; font-weight: 700;
display: inline-flex; align-items: center; gap: 7px;
}
.chip::before { content: ‘’; width: 7px; height: 7px; border-radius: 50%; background: var(–border-hi); transition: all .2s; flex-shrink: 0; }
.chip[data-nat=“الكل”]::before { display: none; }
.chip.eg-chip::before { background: var(–eg); box-shadow: 0 0 6px var(–eg-glow); }
.chip.ng-chip::before { background: var(–ng); box-shadow: 0 0 6px var(–ng-glow); }
.chip.pk-chip::before { background: var(–pk); box-shadow: 0 0 6px var(–pk-glow); }
.chip:hover { border-color: var(–accent); color: var(–accent); }
.chip.active { background: var(–accent-dim); border-color: var(–accent); color: var(–accent); font-weight: 800; box-shadow: 0 2px 10px var(–accent-glow); }
.chip.eg-chip.active { background: var(–eg-bg); border-color: var(–eg); color: var(–eg); box-shadow: 0 2px 10px var(–eg-glow); }
.chip.ng-chip.active { background: var(–ng-bg); border-color: var(–ng); color: var(–ng); box-shadow: 0 2px 10px var(–ng-glow); }
.chip.pk-chip.active { background: var(–pk-bg); border-color: var(–pk); color: var(–pk); box-shadow: 0 2px 10px var(–pk-glow); }

/* فلتر العرض (اسم / تصريح) */
.trow { display: flex; gap: 6px; }
.toggle {
background: #f8fafc; border: 1px solid var(–border); border-radius: var(–radius-sm);
padding: 8px 10px; font-size: 11px; font-family: var(–font); color: var(–text2);
cursor: pointer; transition: all .2s; font-weight: 700; flex: 1; text-align: center;
}
.toggle:hover { border-color: var(–accent); color: var(–accent); }
.toggle.active { background: var(–accent); color: #fff; border-color: var(–accent); box-shadow: 0 3px 10px var(–accent-glow); }

/* STATUS */
.sbar {
padding: 6px 16px; border-bottom: 1px solid var(–border);
display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(–muted); min-height: 30px;
background: #f8fafc;
}
.sdot { width: 7px; height: 7px; border-radius: 50%; background: var(–muted); flex-shrink: 0; animation: blink 2s infinite; }
.sdot.ok { background: var(–pk); animation: none; }
.sdot.err { background: var(–eg); animation: none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* LIST */
.list { overflow-y: auto; padding: 10px; flex: 1; scrollbar-width: thin; scrollbar-color: var(–border) transparent; }
.list::-webkit-scrollbar { width: 4px; }
.list::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }

/* ══ CARDS — ألوان دائمة ══ */
.card {
border: 1px solid var(–border); border-radius: var(–radius);
padding: 14px 16px; margin-bottom: 10px; cursor: pointer;
transition: all .28s cubic-bezier(.4,0,.2,1);
position: relative; overflow: hidden;
animation: slideIn .25s ease both;
background: var(–card);
}
.card::before {
content: ‘’; position: absolute; right: 0; top: 0; bottom: 0;
width: 4px; transition: all .25s;
}
/* ألوان ثابتة — أقوى */
.card.eg { background: linear-gradient(135deg, rgba(220,38,38,.13) 0%, #fff 50%); border-color: var(–eg-border); }
.card.ng { background: linear-gradient(135deg, rgba(37,99,235,.13) 0%, #fff 50%); border-color: var(–ng-border); }
.card.pk { background: linear-gradient(135deg, rgba(22,163,74,.13) 0%, #fff 50%); border-color: var(–pk-border); }
.card.eg::before { background: var(–eg); box-shadow: 0 0 8px var(–eg-glow); }
.card.ng::before { background: var(–ng); box-shadow: 0 0 8px var(–ng-glow); }
.card.pk::before { background: var(–pk); box-shadow: 0 0 8px var(–pk-glow); }
/* hover */
.card.eg:hover { background: var(–eg-bg); border-color: var(–eg); box-shadow: 0 8px 24px var(–eg-glow); transform: translateX(-3px); }
.card.ng:hover { background: var(–ng-bg); border-color: var(–ng); box-shadow: 0 8px 24px var(–ng-glow); transform: translateX(-3px); }
.card.pk:hover { background: var(–pk-bg); border-color: var(–pk); box-shadow: 0 8px 24px var(–pk-glow); transform: translateX(-3px); }
/* active */
.card.eg.active { background: var(–eg-bg); border-color: var(–eg); box-shadow: 0 8px 28px var(–eg-glow); }
.card.ng.active { background: var(–ng-bg); border-color: var(–ng); box-shadow: 0 8px 28px var(–ng-glow); }
.card.pk.active { background: var(–pk-bg); border-color: var(–pk); box-shadow: 0 8px 28px var(–pk-glow); }

@keyframes slideIn { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:translateX(0)} }

.card-hd { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.card-title { font-size: 14px; font-weight: 800; color: var(–text); line-height: 1.3; letter-spacing: -.2px; }
.cbadges { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; }
.badge { border-radius: var(–rpill); padding: 3px 9px; font-size: 10px; font-weight: 800; border: 1px solid; }
.badge.eg { color: var(–eg); border-color: var(–eg-border); background: var(–eg-bg); }
.badge.ng { color: var(–ng); border-color: var(–ng-border); background: var(–ng-bg); }
.badge.pk { color: var(–pk); border-color: var(–pk-border); background: var(–pk-bg); }
.badge.area { color: var(–accent); border-color: var(–accent-glow); background: var(–accent-dim); }

.card-meta {
display: grid; grid-template-columns: 1fr 1fr;
gap: 4px 12px; font-size: 11.5px; color: var(–text2);
margin-bottom: 12px; padding: 9px 11px;
background: #f8fafc; border-radius: var(–radius-sm); border: 1px solid var(–border);
}
.card-meta span { display: flex; align-items: center; gap: 4px; }
.card-meta b { color: var(–text); font-weight: 700; }
.card-meta .warn { color: #b45309; grid-column: 1/-1; font-size: 11px; }

.cactions { display: flex; gap: 6px; flex-wrap: wrap; }
.btn {
display: inline-flex; align-items: center; gap: 5px;
text-decoration: none; border-radius: var(–radius-sm); padding: 7px 12px;
font-size: 11px; font-family: var(–font); font-weight: 700;
border: 1px solid var(–border); color: var(–text2); background: var(–card); cursor: pointer; transition: all .2s;
}
.btn:hover { border-color: var(–accent); color: var(–accent); transform: translateY(-1px); }
.btn.primary { background: var(–accent); color: #fff; border-color: var(–accent); font-weight: 800; box-shadow: 0 3px 10px var(–accent-glow); }
.btn.primary:hover { box-shadow: 0 6px 18px var(–accent-glow); transform: translateY(-2px); }
.btn.danger { color: var(–eg); border-color: var(–eg-border); }
.btn.danger:hover { background: var(–eg-bg); border-color: var(–eg); }

/* ══ MAP — داكن دائماً ══ */
.mapwrap { display: flex; flex-direction: column; }
.mapbar {
padding: 10px 16px;
background: #161d28;
border-bottom: 1px solid #2a3445;
display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.mapnote { font-size: 11.5px; color: #9bacc4; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.mtools { display: flex; gap: 6px; }
.mtoggle {
background: #202a3a; border: 1px solid #2a3445; border-radius: 8px;
padding: 6px 10px; font-size: 11px; font-family: var(–font); color: #9bacc4;
cursor: pointer; font-weight: 700; transition: all .2s;
}
.mtoggle:hover { border-color: #e8b84a; color: #e8b84a; }
.mtoggle.active { background: rgba(232,184,74,.15); border-color: #e8b84a; color: #e8b84a; }
#map { flex: 1; }

/* POPUP داخل الخريطة الداكنة */
.leaflet-popup-content-wrapper {
background: #161d28 !important; border: 1px solid #3a4558 !important;
border-radius: 14px !important; color: #e8eef7 !important;
box-shadow: 0 8px 32px rgba(0,0,0,.5) !important;
font-family: var(–font) !important; padding: 0 !important;
}
.leaflet-popup-content { margin: 0 !important; font-family: var(–font) !important; }
.leaflet-popup-tip { background: #161d28 !important; }
.leaflet-popup-close-button { color: #6b7689 !important; top: 10px !important; left: 10px !important; right: auto !important; font-size: 20px !important; }
.leaflet-popup-close-button:hover { color: #e8b84a !important; }

.pu-inner { padding: 14px; min-width: 230px; }
.pu-title { font-size: 14px; font-weight: 800; color: #e8eef7; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #2a3445; }
.pu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 10px; font-size: 12px; color: #9bacc4; margin-bottom: 12px; padding: 8px; background: rgba(0,0,0,.25); border-radius: 8px; }
.pu-grid span b { color: #e8eef7; font-weight: 700; }
.pu-grid span.full { grid-column: 1/-1; }
.pu-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.pu-btn { display: inline-flex; align-items: center; gap: 4px; text-decoration: none; border-radius: 8px; padding: 6px 10px; font-size: 11px; font-family: var(–font); font-weight: 700; border: 1px solid #2a3445; color: #9bacc4; background: #202a3a; cursor: pointer; transition: all .2s; }
.pu-btn:hover { border-color: #e8b84a; color: #e8b84a; }
.pu-btn.primary { background: linear-gradient(135deg,#e8b84a,#d4a030); color: #0a0e14; border-color: transparent; }
.pu-btn.primary:hover { box-shadow: 0 4px 14px rgba(232,184,74,.35); }
.pu-btn.danger { color: #f87171; border-color: rgba(248,113,113,.4); }
.pu-btn.danger:hover { background: rgba(248,113,113,.12); }

/* MARKERS */
.label-marker { background: transparent; border: none; }
.label-wrap { display: flex; align-items: center; gap: 5px; transform: translate(-50%,-50%); pointer-events: auto; filter: drop-shadow(0 2px 8px rgba(0,0,0,.6)); }
.label-dot { width: 11px; height: 11px; border: 2.5px solid rgba(255,255,255,.9); border-radius: 50%; flex-shrink: 0; }
.label-text { background: #161d28; border-radius: var(–rpill); padding: 3px 8px; font-size: 11px; font-weight: 800; font-family: var(–font); white-space: nowrap; border: 1px solid; line-height: 1.3; }

/* CLUSTER */
.marker-cluster div { font-family: var(–font) !important; }

/* SKELETON */
.skel { background: linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skel-card { background: #f8fafc; border: 1px solid var(–border); border-radius: var(–radius); padding: 14px; margin-bottom: 10px; }
.skel-line { height: 12px; margin-bottom: 8px; }
.skel-line.w70{width:70%} .skel-line.w50{width:50%} .skel-line.w35{width:35%}

/* EMPTY */
.empty { text-align: center; padding: 40px 20px; color: var(–muted); }
.empty-ico { font-size: 36px; margin-bottom: 12px; opacity: .5; }

/* LOCATION PULSE */
@keyframes locPulse { 0%{transform:translate(-50%,-50%) scale(1);opacity:.85} 100%{transform:translate(-50%,-50%) scale(4);opacity:0} }

/* ══ MOBILE ══ */
.mob-sec { display: none; }

@media (max-width: 900px) {
body { overflow: auto; }
.app { display: flex; flex-direction: column; height: auto; }
.sidebar { display: none; }
.mapwrap { height: 58vh; order: 1; }
#map { height: 100%; }
.mapbar .mtools { display: none; }

.mob-sec {
display: flex; flex-direction: column; gap: 10px;
padding: 14px; order: 2; background: var(–bg);
}

.mob-ctrl {
background: var(–card); border: 1px solid var(–border);
border-radius: var(–radius); padding: 14px;
display: flex; flex-direction: column; gap: 12px;
box-shadow: var(–shadow);
}

.mob-top { display: flex; align-items: center; gap: 10px; }
.mob-title { font-size: 15px; font-weight: 900; flex: 1; color: var(–text); }

.mob-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }

/* MINI CARDS — ألوان دائمة */
.mini-card {
border: 1px solid var(–border); border-radius: var(–radius);
padding: 12px; cursor: pointer; background: var(–card);
transition: all .25s cubic-bezier(.4,0,.2,1);
position: relative; overflow: hidden;
}
.mini-card::before { content: ‘’; position: absolute; right: 0; top: 0; bottom: 0; width: 3px; }
.mini-card.eg { background: linear-gradient(135deg,rgba(220,38,38,.13),#fff 55%); border-color: var(–eg-border); }
.mini-card.eg::before { background: var(–eg); box-shadow: 0 0 6px var(–eg-glow); }
.mini-card.ng { background: linear-gradient(135deg,rgba(37,99,235,.13),#fff 55%); border-color: var(–ng-border); }
.mini-card.ng::before { background: var(–ng); box-shadow: 0 0 6px var(–ng-glow); }
.mini-card.pk { background: linear-gradient(135deg,rgba(22,163,74,.13),#fff 55%); border-color: var(–pk-border); }
.mini-card.pk::before { background: var(–pk); box-shadow: 0 0 6px var(–pk-glow); }
.mini-card.eg:hover, .mini-card.eg.active { background: var(–eg-bg); border-color: var(–eg); box-shadow: 0 6px 18px var(–eg-glow); transform: translateY(-2px); }
.mini-card.ng:hover, .mini-card.ng.active { background: var(–ng-bg); border-color: var(–ng); box-shadow: 0 6px 18px var(–ng-glow); transform: translateY(-2px); }
.mini-card.pk:hover, .mini-card.pk.active { background: var(–pk-bg); border-color: var(–pk); box-shadow: 0 6px 18px var(–pk-glow); transform: translateY(-2px); }

.mini-id { font-size: 13px; font-weight: 800; color: var(–text); margin-bottom: 4px; }
.mini-nat { font-size: 10.5px; color: var(–text2); margin-bottom: 8px; font-weight: 600; }
.mini-actions { display: flex; gap: 5px; }
.mini-btn {
flex: 1; background: #f8fafc; border: 1px solid var(–border);
border-radius: 7px; padding: 5px 4px; font-size: 10px;
font-family: var(–font); font-weight: 700; color: var(–text2);
cursor: pointer; text-align: center; transition: all .2s;
}
.mini-btn:hover { color: var(–accent); border-color: var(–accent); background: var(–accent-dim); }

/* LOC BANNER */
.loc-banner {
display: flex; align-items: center; gap: 10px;
border: 1px solid var(–border); border-radius: var(–radius);
padding: 12px 14px; font-size: 12px; color: var(–text2);
font-weight: 600; background: var(–card); transition: all .3s;
box-shadow: var(–shadow);
}
.loc-banner.ok { border-color: var(–pk-border); background: var(–pk-bg); color: var(–pk); }
.loc-banner.denied { border-color: var(–eg-border); background: var(–eg-bg); color: var(–eg); }
.loc-btn {
margin-right: auto; background: var(–card); border: 1px solid var(–border);
border-radius: var(–radius-sm); padding: 7px 12px; font-size: 11px;
font-family: var(–font); font-weight: 800; color: var(–text);
cursor: pointer; white-space: nowrap; transition: all .2s;
}
.loc-btn:hover { border-color: var(–accent); color: var(–accent); }
}
.hidden { display: none !important; }
</style>

</head>
<body>
<div class="app">

<!-- ══ SIDEBAR ══ -->

<aside class="sidebar">
  <div class="head">
    <div class="brand">
      <div class="brand-icon">🏢</div>
      <div class="brand-text">
        <h1>خريطة عماير مكة</h1>
        <p>مساكن حجاج شركة الراجحي — مكة المكرمة</p>
      </div>
    </div>
    <div class="stats-row">
      <span class="stat-pill">الظاهر: <b id="cnt">0</b></span>
      <span class="stat-pill">الخريطة: <b id="mapCnt">0</b></span>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
const API = "https://script.google.com/macros/s/AKfycbyr3jVbbcbBVbG2ZY3aU2vjr-Zp-OG9UtJzZjKOzJSvGARmKxx8WBPfZSQBjERfcDhw-Q/exec";

/* ══ MAP — داكن دائماً ══ */
const map = L.map("map", { zoomControl: true }).setView([21.41, 39.87], 12);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  maxZoom: 19, attribution: "© OpenStreetMap © CARTO"
}).addTo(map);

const group = L.markerClusterGroup({
  maxClusterRadius: 55,
  showCoverageOnHover: false,
  iconCreateFunction: cluster => {
    const n = cluster.getChildCount();
    return L.divIcon({
      html: `<div style="background:rgba(22,29,40,.96);border:2px solid #3a4558;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-family:'Cairo',sans-serif;font-weight:800;font-size:13px;color:#e8b84a;box-shadow:0 3px 12px rgba(0,0,0,.4)">${n}</div>`,
      className: "", iconSize: [36,36], iconAnchor: [18,18]
    });
  }
}).addTo(map);

/* ══ STATE ══ */
let allRows = [], markers = [], natFilter = "الكل", labelMode = "permit";
let userLat = null, userLng = null, userMarker = null, watchId = null;
let selectedRow = null, editPwd = "";

const $ = id => document.getElementById(id);
const esc = v => String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s]));
const num = v => { const n=Number(v); return Number.isFinite(n)?n:null; };
const nc = n => n==="باكستان"?"pk":n==="النيجر"?"ng":"eg";

function dotColor(n) {
  if (n==="باكستان") return { dot:"#4ade80", border:"rgba(74,222,128,.5)", text:"#86efac" };
  if (n==="النيجر")  return { dot:"#60a5fa", border:"rgba(96,165,250,.5)", text:"#93c5fd" };
  return { dot:"#f87171", border:"rgba(248,113,113,.5)", text:"#fca5a5" };
}

function haverKm(la1,ln1,la2,ln2) {
  const R=6371,r=d=>d*Math.PI/180,dL=r(la2-la1),dl=r(ln2-ln1);
  const a=Math.sin(dL/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
const fmtDist = (la1,ln1,la2,ln2) => { const k=haverKm(la1,ln1,la2,ln2); return k<1?`${Math.round(k*1000)} م`:`${k.toFixed(1)} كم`; };

function extractCoords(link) {
  if (!link) return {lat:null,lng:null};
  const s=String(link), pats=[/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/,/@(-?\d+\.\d+),(-?\d+\.\d+)/,/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/,/(-?\d+\.\d+),\s*(-?\d+\.\d+)/];
  for (const p of pats) { const m=s.match(p); if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])}; }
  return {lat:null,lng:null};
}

function buildRow(row, i) {
  let lat=num(row.lat), lng=num(row.lng);
  if (!lat||!lng) { const c=extractCoords(String(row.link||"").trim()); lat=c.lat; lng=c.lng; }
  return {
    _rowNumber: row._rowNumber,
    name: String(row.name||"").trim(),
    permit: String(row.permit||"").trim(),
    phone: String(row.phone||"").trim(),
    extra: String(row.extra||"").trim(),
    nationality: String(row.nationality||"").trim(),
    area: String(row.area||"").trim(),
    owner_building_name: String(row.owner_building_name||"").trim(),
    tenant_name: String(row.tenant_name||"").trim(),
    pilgrims_total: String(row.pilgrims_total||"").trim(),
    rooms_count: String(row.rooms_count||"").trim(),
    unified_contract_no: String(row.unified_contract_no||"").trim(),
    request_no: String(row.request_no||"").trim(),
    lat, lng, has_coords: !!(lat&&lng),
    link: String(row.link||"").trim()
  };
}

function currentLabel(row) {
  return labelMode==="name" ? (row.owner_building_name||row.name) : (row.permit||row.name);
}

function markerIcon(row) {
  const t = dotColor(row.nationality);
  return L.divIcon({
    className: "label-marker",
    html: `<div class="label-wrap"><span class="label-dot" style="background:${t.dot}"></span><span class="label-text" style="border-color:${t.border};color:${t.text}">${esc(currentLabel(row))}</span></div>`,
    iconSize:[140,24], iconAnchor:[18,12], popupAnchor:[0,-10]
  });
}

function rowInfo(row) {
  return [
    row.name, `الجنسية: ${row.nationality}`,
    row.permit && `رقم التصريح: ${row.permit}`,
    row.phone && `رقم التواصل: ${row.phone}`,
    row.area && `الحي: ${row.area}`,
    row.owner_building_name && `اسم العمارة: ${row.owner_building_name}`,
    row.tenant_name && `المستأجر: ${row.tenant_name}`,
    row.pilgrims_total && `عدد الحجاج: ${row.pilgrims_total}`,
    row.unified_contract_no && `العقد الموحد: ${row.unified_contract_no}`
  ].filter(Boolean).join("\n");
}

async function cpTxt(text, btn) {
  try { await navigator.clipboard.writeText(text); } catch { const t=document.createElement("textarea");t.value=text;document.body.appendChild(t);t.select();document.execCommand("copy");t.remove(); }
  if (btn) { const o=btn.textContent; btn.textContent="✓ تم"; btn.style.color="var(--pk)"; setTimeout(()=>{btn.textContent=o;btn.style.color=""},1000); }
}

function puHtml(row) {
  const dist = (userLat&&userLng&&row.has_coords) ? fmtDist(userLat,userLng,row.lat,row.lng) : "";
  return `<div class="pu-inner">
    <div class="pu-title">${esc(row.name)}</div>
    <div class="pu-grid">
      <span>الجنسية: <b>${esc(row.nationality)}</b></span>
      ${row.permit?`<span>التصريح: <b>${esc(row.permit)}</b></span>`:""}
      ${row.area?`<span>الحي: <b>${esc(row.area)}</b></span>`:""}
      ${row.phone?`<span>التواصل: <b>${esc(row.phone)}</b></span>`:""}
      ${row.owner_building_name?`<span>العمارة: <b>${esc(row.owner_building_name)}</b></span>`:""}
      ${row.pilgrims_total?`<span>الحجاج: <b>${esc(row.pilgrims_total)}</b></span>`:""}
      ${dist?`<span class="full">📏 يبعد: <b>${esc(dist)}</b></span>`:""}
      ${!row.has_coords?`<span class="full" style="color:#f59e0b">⚠️ لا توجد إحداثيات بعد</span>`:""}
    </div>
    <div class="pu-actions">
      ${row.link?`<a class="pu-btn primary" href="${row.link}" target="_blank">📍 فتح</a>`:""}
      ${row.has_coords?`<a class="pu-btn" href="https://www.google.com/maps/dir/?api=1&destination=${row.lat},${row.lng}" target="_blank">🧭 ملاحة</a>`:""}
      <button class="pu-btn danger" onclick="startEditByRow(${row._rowNumber})">✏ تحديث</button>
    </div>
  </div>`;
}

function cardHtml(row) {
  const dist = (userLat&&userLng&&row.has_coords) ? fmtDist(userLat,userLng,row.lat,row.lng) : "—";
  const ncls = nc(row.nationality);
  return `
    <div class="card-hd">
      <div class="card-title">${esc(row.name)}</div>
      <div class="cbadges">
        ${row.area?`<span class="badge area">${esc(row.area)}</span>`:""}
        <span class="badge ${ncls}">${esc(row.nationality)}</span>
      </div>
    </div>
    <div class="card-meta">
      ${row.permit?`<span>التصريح: <b>${esc(row.permit)}</b></span>`:"<span></span>"}
      ${row.phone?`<span>التواصل: <b>${esc(row.phone)}</b></span>`:"<span></span>"}
      ${row.owner_building_name?`<span>العمارة: <b>${esc(row.owner_building_name)}</b></span>`:"<span></span>"}
      ${row.pilgrims_total?`<span>الحجاج: <b>${esc(row.pilgrims_total)}</b></span>`:"<span></span>"}
      <span>📏 يبعد: <b>${dist}</b></span>
      ${!row.has_coords?`<span class="warn">⚠️ لا توجد إحداثيات بعد</span>`:"<span></span>"}
    </div>
    <div class="cactions">
      <button class="btn" data-copy="info">نسخ المعلومات</button>
      ${row.link?`<button class="btn" data-copy="loc">نسخ الموقع</button>`:""}
      ${row.has_coords?`<a class="btn primary" target="_blank" href="https://www.google.com/maps/dir/?api=1&destination=${row.lat},${row.lng}">🧭 ملاحة</a>`:""}
      <button class="btn danger" data-edit="1">✏ تحديث</button>
    </div>`;
}

function bindAct(div, row) {
  div.querySelector("[data-copy='info']")?.addEventListener("click", e=>{e.stopPropagation();cpTxt(rowInfo(row),e.currentTarget)});
  div.querySelector("[data-copy='loc']")?.addEventListener("click", e=>{e.stopPropagation();cpTxt(row.link,e.currentTarget)});
  div.querySelector("[data-edit='1']")?.addEventListener("click", e=>{e.stopPropagation();startEdit(row)});
}

function filterRows() {
  const q = ($("search").value || $("searchM").value || "").trim().toLowerCase();
  return allRows.filter(r => {
    const natOk = natFilter==="الكل" || r.nationality===natFilter;
    const tx = [r.name, r.permit, r.area, r.owner_building_name, r.phone, r.tenant_name].join(" ").toLowerCase();
    return natOk && (!q || tx.includes(q));
  });
}

function clearMk() { group.clearLayers(); markers = []; }

function renderMarkers(rows) {
  clearMk();
  const withCoords = rows.filter(r => r.has_coords);
  withCoords.forEach(row => {
    const m = L.marker([row.lat,row.lng], {icon:markerIcon(row)});
    m.bindPopup(puHtml(row), {maxWidth:300});
    m.row = row;
    markers.push(m);
    group.addLayer(m);
  });
  $("mapCnt").textContent = withCoords.length;
  $("mapCntM").textContent = withCoords.length;
}

function render() {
  const rows = filterRows();
  renderMarkers(rows);

  // sidebar list
  const list = $("list"); list.innerHTML = "";
  if (!rows.length) {
    list.innerHTML = `<div class="empty"><div class="empty-ico">🔍</div><div>لا توجد نتائج</div></div>`;
  } else {
    rows.forEach((row, i) => {
      const div = document.createElement("div");
      div.className = `card ${nc(row.nationality)}`;
      div.style.animationDelay = `${Math.min(i*18,280)}ms`;
      div.innerHTML = cardHtml(row);
      bindAct(div, row);
      div.addEventListener("click", e => {
        if (e.target.closest("a,button")) return;
        if (row.has_coords) { map.setView([row.lat,row.lng],17); const mk=markers.find(m=>m.row===row); if(mk)mk.openPopup(); $("map").scrollIntoView({behavior:"smooth",block:"start"}); }
        else if (row.link) window.open(row.link,"_blank");
      });
      list.appendChild(div);
    });
  }

  // mobile grid
  const mg = $("mobGrid"); mg.innerHTML = "";
  rows.forEach(row => {
    const d = (userLat&&userLng&&row.has_coords) ? fmtDist(userLat,userLng,row.lat,row.lng) : "";
    const div = document.createElement("div");
    div.className = `mini-card ${nc(row.nationality)}`;
    div.innerHTML = `
      <div class="mini-id">${esc(row.permit || row.name)}</div>
      <div class="mini-nat">${esc(row.nationality)}${row.area?` • ${esc(row.area)}`:""}</div>
      ${d?`<div style="font-size:10px;color:var(--text2);margin-bottom:6px;font-weight:700">📏 ${esc(d)}</div>`:""}
      <div class="mini-actions">
        <button class="mini-btn" data-copy="info">نسخ</button>
        ${row.link?`<button class="mini-btn" data-copy="loc">موقع</button>`:""}
        <button class="mini-btn" data-edit="1">تحديث</button>
      </div>`;
    div.querySelector("[data-copy='info']")?.addEventListener("click", e=>{e.stopPropagation();cpTxt(rowInfo(row),e.currentTarget)});
    div.querySelector("[data-copy='loc']")?.addEventListener("click", e=>{e.stopPropagation();cpTxt(row.link,e.currentTarget)});
    div.querySelector("[data-edit='1']")?.addEventListener("click", e=>{e.stopPropagation();startEdit(row)});
    div.addEventListener("click", e => {
      if (e.target.closest("button")) return;
      if (row.has_coords) { map.setView([row.lat,row.lng],17); const mk=markers.find(m=>m.row===row); if(mk)mk.openPopup(); $("map").scrollIntoView({behavior:"smooth",block:"start"}); }
      else if (row.link) window.open(row.link,"_blank");
    });
    mg.appendChild(div);
  });

  $("cnt").textContent  = rows.length;
  $("cntM").textContent = rows.length;
}

function setNat(val) {
  natFilter = val;
  document.querySelectorAll("[data-nat],[data-nat-map],[data-nat-mob]").forEach(b => {
    const v = b.dataset.nat || b.dataset.natMap || b.dataset.natMob;
    b.classList.toggle("active", v===val);
  });
  render();
}

function setLabel(mode) {
  labelMode = mode;
  const isName = mode==="name";
  ["showName","mShowName","mShowNameMob"].forEach(id => $(id)?.classList.toggle("active", isName));
  ["showPermit","mShowPermit","mShowPermitMob"].forEach(id => $(id)?.classList.toggle("active", !isName));
  markers.forEach(m => m.setIcon(markerIcon(m.row)));
}

/* ══ LOCATION ══ */
function setBanner(state, msg) {
  const b=$("locBanner"), tx=$("locTxt"), btn=$("locBtn");
  if (!b) return;
  b.className = "loc-banner"+(state==="ok"?" ok":state==="denied"?" denied":"");
  if (tx) tx.textContent = msg;
  if (btn) btn.textContent = state==="ok"?"تحديث":"إعادة المحاولة";
}

function mkLocIcon() {
  return L.divIcon({
    className: "",
    html: `<div style="position:relative;width:22px;height:22px">
      <div style="position:absolute;top:50%;left:50%;width:13px;height:13px;background:#3b82f6;border:2.5px solid #fff;border-radius:50%;z-index:2;box-shadow:0 0 12px rgba(59,130,246,.9);transform:translate(-50%,-50%)"></div>
      <div style="position:absolute;top:50%;left:50%;width:13px;height:13px;background:rgba(59,130,246,.35);border-radius:50%;animation:locPulse 2s ease-out infinite;transform:translate(-50%,-50%)"></div>
    </div>`,
    iconSize:[22,22], iconAnchor:[11,11], popupAnchor:[0,-13]
  });
}

function updateLoc(lat, lng, center=false) {
  userLat=lat; userLng=lng;
  if (!userMarker) userMarker=L.marker([lat,lng],{icon:mkLocIcon(),zIndexOffset:9999}).addTo(map).bindPopup("📍 موقعك الحالي");
  else { userMarker.setLatLng([lat,lng]); userMarker.setIcon(mkLocIcon()); }
  if (center) { map.setView([lat,lng],15); userMarker.openPopup(); }
  setBanner("ok","✓ تم تحديد موقعك — المسافات تظهر الآن");
  $("sdot").className = "sdot ok";
  render();
}

function startLoc(forceCenter=false) {
  if (!navigator.geolocation) { setBanner("denied","المتصفح لا يدعم تحديد الموقع."); return; }
  if (watchId!==null) { navigator.geolocation.clearWatch(watchId); watchId=null; }
  setBanner("","⏳ جارِ تحديد موقعك...");
  let centered = !forceCenter;
  const ok = pos => { const c=!centered; centered=true; updateLoc(pos.coords.latitude,pos.coords.longitude,c); };
  const err = e => { const m={1:"🚫 رُفض الإذن — افتح الإعدادات",2:"⚠️ تعذر تحديد موقعك — تأكد من GPS",3:"⏱ انتهت المهلة — اضغط إعادة المحاولة"}; setBanner("denied",m[e.code]||"خطأ."); };
  navigator.geolocation.getCurrentPosition(ok,err,{enableHighAccuracy:true,timeout:15000,maximumAge:0});
  watchId = navigator.geolocation.watchPosition(ok,()=>{},{enableHighAccuracy:true,maximumAge:5000,timeout:20000});
}

/* ══ EDIT ══ */
function startEdit(row) {
  const pwd = prompt("أدخل كلمة السر");
  if (!pwd) return;
  selectedRow=row; editPwd=pwd;
  alert("الآن اضغط المكان الصحيح في الخريطة");
}
function startEditByRow(rn) { const row=allRows.find(r=>Number(r._rowNumber)===Number(rn)); if(row) startEdit(row); }
window.startEditByRow = startEditByRow;

map.on("click", async e => {
  if (!selectedRow) return;
  const lat=e.latlng.lat, lng=e.latlng.lng;
  try {
    const res=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"updateLocation",rowNumber:selectedRow._rowNumber,lat,lng,password:editPwd})});
    const result=await res.json();
    if (!result.ok) { alert("فشل التحديث: "+(result.error||"خطأ")); selectedRow=null; editPwd=""; return; }
    selectedRow.lat=lat; selectedRow.lng=lng; selectedRow.has_coords=true; selectedRow.link=`https://www.google.com/maps?q=${lat},${lng}`;
    selectedRow=null; editPwd=""; render(); alert("✅ تم تحديث الموقع بنجاح");
  } catch(err) { alert("تعذر حفظ التحديث"); selectedRow=null; editPwd=""; }
});

/* ══ LOAD ══ */
async function loadData() {
  $("sdot").className="sdot"; $("stxt").textContent="جارِ تحميل البيانات...";
  try {
    const res=await fetch(API+"?action=list");
    const json=await res.json();
    allRows=json.map(buildRow);
    render();
    const wc=allRows.filter(r=>r.has_coords);
    if (wc.length) map.fitBounds(L.latLngBounds(wc.map(r=>[r.lat,r.lng])).pad(.15));
    $("sdot").className="sdot ok";
    $("stxt").textContent=`${allRows.length} سجل — ${wc.length} بإحداثيات`;
  } catch(e) {
    $("sdot").className="sdot err"; $("stxt").textContent="تعذر تحميل البيانات";
    $("list").innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><div>تعذر تحميل البيانات</div></div>`;
  }
}

/* ══ EVENTS ══ */
document.querySelectorAll("[data-nat],[data-nat-map],[data-nat-mob]").forEach(b =>
  b.addEventListener("click", () => setNat(b.dataset.nat||b.dataset.natMap||b.dataset.natMob))
);
$("showName").onclick = $("mShowName").onclick = $("mShowNameMob").onclick = () => setLabel("name");
$("showPermit").onclick = $("mShowPermit").onclick = $("mShowPermitMob").onclick = () => setLabel("permit");
$("fitBtn").onclick = () => { const r=filterRows(); const p=r.filter(x=>x.has_coords); if(p.length) map.fitBounds(L.latLngBounds(p.map(x=>[x.lat,x.lng])).pad(.15)); };
$("locateBtn").onclick = () => startLoc(true);
$("locBtn").onclick = () => startLoc(true);
$("search").addEventListener("input", () => { $("searchM").value=$("search").value; render(); });
$("searchM").addEventListener("input", () => { $("search").value=$("searchM").value; render(); });

window.addEventListener("load", () => { loadData(); startLoc(true); });
</script>

</body>
</html>
