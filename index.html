<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>خريطة عماير مكة</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Tahoma; background:#f5f5f5 }
#map { height:60vh }
.controls { padding:10px }
input { width:100%; padding:10px; border-radius:10px; border:1px solid #ccc }
.filters { display:flex; gap:6px; margin-top:8px }
.filters button { flex:1; padding:6px; border-radius:8px; border:1px solid #ccc; cursor:pointer }
.filters .active { background:#0f766e; color:#fff }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px }
.card { background:#fff; border-radius:12px; padding:10px; border:1px solid #ddd }
.btns { display:flex; gap:6px; margin-top:6px }
.btn { flex:1; padding:6px; border:none; border-radius:6px; cursor:pointer }
.btn.primary { background:#0f766e; color:#fff }
</style>
</head>

<body>

<div id="map"></div>

<div class="controls">
  <input id="search" placeholder="ابحث">
  <div class="filters">
    <button data-filter="الكل" class="active">الكل</button>
    <button data-filter="مصر">مصر</button>
    <button data-filter="النيجر">النيجر</button>
    <button data-filter="باكستان">باكستان</button>
    <button id="locate">موقعي</button>
  </div>
</div>

<div class="grid" id="list"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API = "https://script.google.com/macros/s/AKfycbyr3jVbbcbBVbG2ZY3aU2vjr-Zp-OG9UtJzZjKOzJSvGARmKxx8WBPfZSQBjERfcDhw-Q/exec";

const map = L.map("map").setView([21.41,39.87],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let rows = [];
let markers = [];
let filter = "الكل";
let userLat=null,userLng=null;
let selectedRow=null,password="";

// استخراج إحداثيات من الرابط
function extract(link){
  if(!link) return {};
  let m = link.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
  if(m) return {lat:+m[1],lng:+m[2]};
  m = link.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m) return {lat:+m[1],lng:+m[2]};
  return {};
}

// حساب المسافة
function dist(a,b,c,d){
  const R=6371;
  const toRad=x=>x*Math.PI/180;
  const dLat=toRad(c-a);
  const dLng=toRad(d-b);
  const x=Math.sin(dLat/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

async function load(){
  let res=await fetch(API+"?action=list");
  rows=await res.json();
  render();
}

function render(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  let list=document.getElementById("list");
  list.innerHTML="";

  let q=document.getElementById("search").value.toLowerCase();

  rows.forEach(r=>{
    let lat=+r.lat, lng=+r.lng;

    if(!lat||!lng){
      let c=extract(r.link);
      lat=c.lat; lng=c.lng;
    }

    let show = (filter==="الكل"||r.nationality===filter)
      && (r.name||"").toLowerCase().includes(q);

    if(!show) return;

    if(lat&&lng){
      let m=L.marker([lat,lng]).addTo(map);
      m.bindPopup(r.permit);
      markers.push(m);
    }

    let distance="";
    if(userLat && lat){
      distance = "يبعد: "+dist(userLat,userLng,lat,lng).toFixed(1)+" كم";
    }

    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <b>${r.permit}</b><br>
      ${r.nationality}<br>
      ${distance}
      <div class="btns">
        <button class="btn" onclick="openLink('${r.link}')">موقع</button>
        <button class="btn" onclick="edit(${r._rowNumber})">تحديث</button>
      </div>
    `;
    list.appendChild(div);
  });
}

function openLink(l){
  if(l) window.open(l);
}

function edit(row){
  selectedRow=row;
  password=prompt("كلمة السر");
  alert("اضغط الموقع في الخريطة");
}

map.on("click", async e=>{
  if(!selectedRow) return;

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"updateLocation",
      rowNumber:selectedRow,
      lat:e.latlng.lat,
      lng:e.latlng.lng,
      password
    })
  });

  selectedRow=null;
  load();
});

// فلتر
document.querySelectorAll("[data-filter]").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll("[data-filter]").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    filter=b.dataset.filter;
    render();
  }
});

// موقعي
document.getElementById("locate").onclick=()=>{
  navigator.geolocation.getCurrentPosition(p=>{
    userLat=p.coords.latitude;
    userLng=p.coords.longitude;
    map.setView([userLat,userLng],15);
    render();
  });
};

document.getElementById("search").oninput=render;

load();
</script>

</body>
</html>
