<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>خريطة عماير مكة</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Tahoma; }
#map { height:100vh; }

.panel {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 320px;
  max-height: 90vh;
  overflow:auto;
  background:#fff;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.15);
  padding:10px;
  z-index:999;
}

.item {
  border:1px solid #eee;
  border-radius:10px;
  padding:8px;
  margin-bottom:8px;
}

.btn {
  padding:5px 8px;
  border:none;
  border-radius:6px;
  background:#0f766e;
  color:#fff;
  cursor:pointer;
  font-size:12px;
  margin-top:5px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel" id="list"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API = "https://script.google.com/macros/s/AKfycbyr3jVbbcbBVbG2ZY3aU2vjr-Zp-OG9UtJzZjKOzJSvGARmKxx8WBPfZSQBjERfcDhw-Q/exec";

const map = L.map("map").setView([21.41,39.87],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let selectedRow = null;
let password = "";

function extractCoordsFromLink(link){
  if(!link) return {lat:null,lng:null};

  let m;

  // ⭐ الأهم (الرابط حقك)
  m = link.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
  if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};

  m = link.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};

  m = link.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};

  m = link.match(/(-?\d+\.\d+),\s*(-?\d+\.\d+)/);
  if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};

  return {lat:null,lng:null};
}

function build(row){
  let lat = parseFloat(row.lat);
  let lng = parseFloat(row.lng);

  if(!lat || !lng){
    let c = extractCoordsFromLink(row.link);
    lat = c.lat;
    lng = c.lng;
  }

  return {
    ...row,
    lat,
    lng,
    has: !!lat
  };
}

async function load(){
  let res = await fetch(API + "?action=list");
  let data = await res.json();

  let list = document.getElementById("list");
  list.innerHTML = "";

  data.map(build).forEach(r=>{

    // رسم النقطة
    if(r.has){
      let m = L.marker([r.lat,r.lng]).addTo(map);
      m.bindPopup(r.name);
    }

    // القائمة
    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <b>${r.name || ""}</b><br>
      ${r.permit || ""}<br>
      ${r.has ? "📍 موجود" : "❌ بدون موقع"}<br>

      <button class="btn open">فتح</button>
      <button class="btn edit">تحديث</button>
    `;

    div.querySelector(".open").onclick = ()=>{
      if(r.link) window.open(r.link);
    };

    div.querySelector(".edit").onclick = ()=>{
      selectedRow = r;
      password = prompt("كلمة السر");
      alert("اضغط الموقع في الخريطة");
    };

    list.appendChild(div);
  });
}

map.on("click", async (e)=>{
  if(!selectedRow) return;

  let lat = e.latlng.lat;
  let lng = e.latlng.lng;

  await fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"updateLocation",
      rowNumber:selectedRow._rowNumber,
      lat,
      lng,
      password
    })
  });

  alert("تم الحفظ");
  selectedRow = null;
  load();
});

load();
</script>

</body>
</html>
